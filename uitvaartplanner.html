<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uitvaartplanner — Uitvaart-Platform.nl</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,600;0,700;0,900;1,300;1,700&display=swap" rel="stylesheet">
<style>
/* --- Bestaande CSS --- */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #faf7f2; color: #1e1520; }

@media print {
  .up-no-print { display: none !important; }
  body { background: #fff; }
  .up-wrap { padding: 0; }
  .up-hero { border-radius: 0; }
  .up-overzicht { box-shadow: none; }
  .up-print-header { display: block !important; }
}
.up-print-header { display: none; padding: 20px 0; border-bottom: 2px solid #4a1942; margin-bottom: 20px; }
.up-print-header h1 { font-size: 1.5rem; color: #4a1942; font-weight: 900; }
.up-print-header p { font-size: 0.8rem; color: #6b6570; }

.up-wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }

.up-hero {
  background: #4a1942; border-radius: 16px; padding: 56px 48px;
  position: relative; overflow: hidden; margin-bottom: 14px;
}
.up-hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 100% 0%, rgba(232,131,74,0.2) 0%, transparent 50%),
              radial-gradient(ellipse 50% 70% at 0% 100%, rgba(58,18,51,0.6) 0%, transparent 55%);
  pointer-events: none;
}
.up-hero-inner { max-width: 700px; position: relative; z-index: 2; }
.up-hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(232,131,74,0.15); border: 1px solid rgba(232,131,74,0.35); border-radius: 30px; padding: 6px 16px; margin-bottom: 20px; }
.up-hero-badge-dot { width: 8px; height: 8px; background: #e8834a; border-radius: 50%; }
.up-hero-badge span { font-size: 0.65rem; font-weight: 700; color: #e8834a; letter-spacing: 0.16em; text-transform: uppercase; }
.up-hero h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 900; color: #fff; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 14px; }
.up-hero h1 em { font-style: italic; font-weight: 300; color: rgba(255,255,255,0.5); }
.up-hero-sub { font-size: 0.95rem; color: rgba(255,255,255,0.65); font-weight: 300; line-height: 1.85; max-width: 580px; margin-bottom: 28px; }
.up-hero-stats { display: flex; gap: 32px; flex-wrap: wrap; }
.up-hero-stat-nr { font-size: 1.6rem; font-weight: 900; color: #e8834a; line-height: 1; }
.up-hero-stat-label { font-size: 0.72rem; color: rgba(255,255,255,0.55); font-weight: 300; }

.up-tabs { display: flex; gap: 6px; background: #fff; border: 1px solid #e2d9e0; border-radius: 14px; padding: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.up-tab { flex: 1; min-width: 140px; padding: 12px 16px; border: none; background: none; border-radius: 10px; font-family: 'Poppins', sans-serif; font-size: 0.8rem; font-weight: 600; color: #6b6570; cursor: pointer; transition: all 0.2s; text-align: center; display: flex; align-items: center; justify-content: center; gap: 7px; }
.up-tab:hover { background: #faf7f2; color: #4a1942; }
.up-tab.actief { background: #4a1942; color: #fff; }
.up-tab-icoon { font-size: 1rem; }

.up-layout { display: grid; grid-template-columns: 1fr 360px; gap: 14px; align-items: start; }
.up-sectie { background: #fff; border: 1px solid #e2d9e0; border-radius: 16px; overflow: hidden; margin-bottom: 14px; }
.up-sectie-header { background: #faf7f2; border-bottom: 1px solid #e2d9e0; padding: 18px 24px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
.up-sectie-nr { width: 34px; height: 34px; border-radius: 50%; background: #4a1942; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 800; flex-shrink: 0; }
.up-sectie-titel { font-size: 0.96rem; font-weight: 800; color: #4a1942; }
.up-sectie-totaal { font-size: 1rem; font-weight: 800; color: #4a1942; text-align: right; }
.up-sectie-body { padding: 20px 24px; display: none; }
.up-sectie-body.open { display: block; }

.up-rij { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0ebef; }
.up-rij-prijs { font-size: 0.88rem; font-weight: 700; color: #4a1942; text-align: right; min-width: 80px; }
.up-rij-prijs.actief { color: #e8834a; }
.up-rij-slider-wrap { grid-column: 1 / -1; padding-top: 8px; display: none; }
.up-rij-slider-wrap.zichtbaar { display: block; }
.up-rij-slider { width: 100%; accent-color: #4a1942; cursor: pointer; }

.up-overzicht { background: #fff; border: 1px solid #e2d9e0; border-radius: 16px; overflow: hidden; position: sticky; top: 20px; }
.up-overzicht-header { background: #4a1942; padding: 20px 22px; color: white; }
.up-overzicht-totaal { font-size: 2rem; font-weight: 900; }

.up-btn { width: 100%; padding: 12px; border-radius: 10px; font-family: 'Poppins', sans-serif; font-size: 0.84rem; font-weight: 700; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
.up-btn-paars { background: #4a1942; color: #fff; }

@media (max-width: 900px) {
  .up-layout { grid-template-columns: 1fr; }
  .up-overzicht { position: static; }
}
</style>
</head>
<body>

<div class="up-wrap">
  <div class="up-print-header">
    <h1>Uitvaartplanner — Uitvaart-Platform.nl</h1>
    <p>Gegenereerd op <span id="printDatum"></span></p>
  </div>

  <div class="up-hero up-no-print">
    <div class="up-hero-inner">
      <div class="up-hero-badge"><div class="up-hero-badge-dot"></div><span>Uitvaartplanner</span></div>
      <h1>Wat kost een uitvaart —<br><em>bereken het zelf</em></h1>
      <p class="up-hero-sub">Bereken de kosten en vergelijk regio's.</p>
    </div>
  </div>

  <div class="up-tabs up-no-print">
    <button class="up-tab actief">🧮 Kostencalculator</button>
  </div>

  <div class="up-layout">
    <div class="up-sectie">
      <div class="up-sectie-header open">
        <div class="up-sectie-nr">1</div>
        <div class="up-sectie-info"><div class="up-sectie-titel">Basiskosten</div></div>
        <div class="up-sectie-totaal">€ 4.190</div>
      </div>
      <div class="up-sectie-body open">
        <div class="up-rij">
          <div>
            <div class="up-rij-naam">Uitvaartondernemer</div>
            <div class="up-rij-slider-wrap zichtbaar">
              <input type="range" class="up-rij-slider" min="1500" max="6000" value="2500">
            </div>
          </div>
          <div class="up-rij-prijs actief">€ 2.500</div>
        </div>
      </div>
    </div>

    <div class="up-overzicht">
      <div class="up-overzicht-header">
        <div style="font-size:0.7rem; opacity:0.8;">TOTAAL GESCHAT</div>
        <div class="up-overzicht-totaal">€ 4.190</div>
      </div>
      <div style="padding: 20px;">
        <button class="up-btn up-btn-paars">Offerte aanvragen</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.3.2/iframeResizer.contentWindow.min.js"></script>

<script>
  // Voeg hier je JavaScript logica toe voor de berekeningen indien nodig
  document.getElementById('printDatum').innerText = new Date().toLocaleDateString('nl-NL');
</script>

</body>
</html>
